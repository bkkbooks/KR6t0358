body:
  text: 正像末法和讃康元二歳丁巳二月九日夜寅時夢告云彌陀本願信本願信攝取不捨利益無上覺正像末淨土和讃愚禿善信集釋迦如來二千餘年正像二時如來遺弟悲泣末法五濁有情行證釋迦遺法龍宮正像末三時彌陀本願像季末法世諸善龍宮大集經世第五五百年鬭諍堅固白法隱滯數萬歳有情果報二萬歳五濁惡世名劫濁有情身小五濁惡邪毒蛇惡龍無明煩惱塵數遍滿愛憎違順高峯岳山有情邪見熾盛叢林棘刺念佛信者疑謗破壞瞋毒命濁中夭刹那依正二報滅亡背正歸邪横末法第五五百年世一切有情如來悲願信出離期九十五種世唯佛一道菩提出到火宅利益自然五濁時機道俗念佛信疑謗破滅菩提專修念佛頓教毀滅生死大海正法時機底下凡愚身清淨眞實發菩提心自力聖道菩提心常沒流轉凡愚發起三恒河沙諸佛出世大菩提心自力流轉像末五濁世釋迦遺教彌陀悲願念佛往生超世無上攝取選擇五劫思惟光明壽命誓願大悲本淨土大菩提心願作佛心願作佛心度衆生心度衆生心彌陀智願迴向迴向信樂大般涅槃如來迴向歸入願作佛心自力迴向利益有情彌陀智願海水他力信水眞實報土煩惱菩提一味如來二種迴向信等正覺憶念心彌陀智願迴向信樂攝取不捨利益等正覺五十六億七千萬彌勒菩薩信心念佛往生願等正覺彌勒大般涅槃眞實信心定聚補處彌勒無上覺像法智人自力諸教時機相應法念佛門彌陀尊號信樂憶念心佛恩報五濁惡世有情選擇本願信不可稱不可説不可思議功徳行者身無礙光佛未來有情利大勢至菩薩智慧念佛濁世有情勢至念佛信心攝取淨土歸入釋迦彌陀慈悲願作佛心信心智慧佛恩報身智慧念佛法藏願力信心智慧涅槃無明長夜燈炬智眼生死大海船筏罪障願力無窮罪業深重佛智無邊散亂放逸如來作願苦惱有情迴向首大悲心成就眞實信心稱名彌陀迴向法不迴向自力稱念彌陀智願廣海凡夫善惡心水歸入大悲心轉造惡弟子邪見放逸末世法破蓮華面經念佛誹謗有情阿鼻地獄墮在八萬劫中大苦惱眞實報土正因二尊正定聚住滅度十方無量諸佛證誠護念自力大菩提心眞實信心末法濁世恒沙諸佛證誠往相還相迴向身流轉輪迴苦海沈淪佛智不思議信正定聚住化生智慧無上覺不思議佛智信報土因信心正因無始流轉苦無上涅槃期如來二種迴向恩徳謝報土信者化土行者自力菩提久遠劫流轉南無阿彌陀佛迴向恩徳廣大不思議往相迴向利益還相迴向迴入往相迴向大慈還相迴向大悲如來迴向淨土菩提彌陀觀音大勢至大願乘生死有情彌陀大悲誓願信南無阿彌陀佛聖道門自力心他力不思議義義信知釋迦教法修有情末法一人三朝淨土大師等哀愍攝受眞實信心定聚他力信心親友教主世尊如來大悲恩徳身粉報師主知識恩徳謝已上正像末法和讃五十八首不了佛智如來諸智疑惑罪福信善本邊地佛智不思議自力稱念邊地懈慢佛恩報罪福信行者佛智不思議疑城胎宮三寶佛智疑惑懈慢邊地疑惑年歳劫數轉輪皇王子皇金鎖牢獄自力稱名如來本願信七寶獄信心疑心自力行者如來大悲恩稱名念佛自力諸善佛智不思議自業自得道理七寶獄佛智不思議善本徳本邊地懈慢大慈大悲本願疑惑行者含花未出或生邊地或墮宮胎如來諸智疑惑信罪福信善本修習佛智疑惑胎生智慧胎宮牢獄七寶宮殿五百歳三寶見聞有情利益邊地七寶宮殿五百歳過咎厄罪福信善本修習疑心善人方便化土彌陀本願信疑惑帶胎處慈氏菩薩世尊何因何縁胎生化生如來慈氏疑惑心善本修胎生邊地佛智疑惑五百歳牢獄胎生佛智不思議罪福信有情宮殿胎生自力心不思議佛智胎宮五百歳三寶慈悲佛智不思議疑惑罪福信善本修淨土胎生佛智心佛智不思議已上二十三首佛不思議彌陀御愚禿悲歎述懷淨土眞宗歸眞實心虚假不實身清淨心外儀賢善精進現貪瞋邪僞奸詐身惡性蛇蝎修善雜毒虚假行無慚無愧身彌陀迴向御名功徳十方小慈小悲身有情利益如來願船苦海蛇蝎奸詐自力修善如來迴向無慚無愧五濁増世道俗外儀佛教内心外道歸敬道俗良時吉日天神地祇卜占祭祀僧法師御名提婆五邪法外道梵土尼乾志如來法衣一切鬼神和國道俗佛教威儀天地鬼神尊敬五濁邪惡僧法師御名奴婢僕使無戒名字比丘末法濁世世舍利弗目連供養恭敬罪業妄想顛倒心性世末法惡世南都北嶺佛法者輿僧達力者法師高位名佛法比丘比丘尼奴婢法師僧徒僕從名已上十六首愚禿述懷世本寺本山僧法師釋親鸞書之善光寺如來御名守屋疫癘守屋守屋外道如來世佛法守屋僧法師弓削守屋大連邪見親鸞八十八歳御筆獲字因位獲得字果位得名字因位名號字果位號自然自行者然行者如來法爾如來御法爾法爾御行者他力義義自然彌陀佛御行者南無阿彌陀佛行者自然無上佛無上佛自然無上涅槃彌陀佛彌陀佛自然道理自然自然義義義佛智不思議文字善惡字是非邪正身小慈小悲名利人師已上右斯三帖和讃并正信偈四帖一部者末代爲興際板木開之者也而已文明五年癸巳三月日蓮如花押四十八願成就正覺彌陀往生極樂無爲報土雜行如來要法專修行兆載永劫修行阿彌陀三字五劫思惟名號五濁付屬阿彌陀如來三業念佛行者三業彼此金剛心定聚多聞淨戒破戒罪業念瓦礫金變金剛堅固信心佛相續他力方便決定心大願海煩惱弘誓大悲風超世悲願生死凡夫有漏穢身淨土六八弘誓第三十五願彌陀女人引接
